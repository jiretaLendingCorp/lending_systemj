# schedule = "0 1 * * *"
# command = "SELECT net.http_post(url := 'http://localhost:54321/functions/v1/loans-compute-penalty', headers := jsonb_build_object('x-cron-secret', current_setting('app.cron_secret')), body := '{}'::jsonb);"

